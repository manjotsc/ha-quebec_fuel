name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/quebec_fuel/manifest.json > tmp.json \
            && mv tmp.json custom_components/quebec_fuel/manifest.json

      - name: Create zip
        run: |
          cd custom_components/quebec_fuel
          zip -r ../../quebec_fuel.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: quebec_fuel.zip
